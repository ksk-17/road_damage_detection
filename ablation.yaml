# ablation.yaml
# Ablation Study Configuration
# Lists the models to compare — no training happens here.
# Train each model with train.py first, then run ablation.py to evaluate and compare.
#
# Usage:
#   python ablation.py --config ablation.yaml \
#                      --checkpoint-dir /content/drive/MyDrive/road_ckpts \
#                      --data-dir /content/RDD_SPLIT

models:
  - name: yolov11_baseline
    label: "YOLOv11 Baseline"
    config: yolov11_baseline.yaml

  - name: yolov11_improved
    label: "YOLOv11 Improved"
    config: yolov11_improved.yaml

  - name: rtdetrv2_baseline
    label: "RT-DETRv2 Baseline"
    config: rtdetr_baseline.yaml

  - name: rtdetrv2_improved
    label: "RT-DETRv2 Improved"
    config: rtdetr_improved.yaml

evaluation:
  data_dir: ./data/RDD_SPLIT
  output_dir: ./runs/ablation
