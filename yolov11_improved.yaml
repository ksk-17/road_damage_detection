# configs/yolov11_improved.yaml
# YOLOv11 with ALL Improvements — RDD2022
# Improvements: (1) 4th FPN scale, (2) Focal+WIoU loss, (3) Domain Adaptation

model:
  name: yolov11
  variant: yolo11m
  pretrained: true
  pretrained_weights: yolo11m.pt
  num_classes: 4
  class_names: [D00, D10, D20, D40]
  fpn_scales: 4               # IMPROVEMENT 1: Extra P2 head for hairline cracks

dataset:
  root: ./data/rdd2022
  train_countries: [Japan]
  val_countries: [Japan]
  test_countries: [Japan, India, USA]
  image_size: 640
  cache: true

training:
  epochs: 100
  batch_size: 16
  num_workers: 8
  device: cuda

optimizer:
  name: AdamW
  lr: 0.001
  weight_decay: 0.0005
  momentum: 0.937

scheduler:
  name: cosine
  warmup_epochs: 3
  min_lr: 1.0e-5

loss:
  box: focal_wiou             # IMPROVEMENT 2: Focal + WIoU (vs. baseline CIoU)
  cls: focal
  obj: bce
  box_weight: 7.5
  cls_weight: 0.5
  obj_weight: 1.0
  focal_gamma: 2.0            # Focal loss gamma
  focal_alpha: 0.25           # Focal loss alpha
  wiou_momentum: 0.5          # WIoU dynamic focusing momentum

augmentation:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 10.0
  translate: 0.1
  scale: 0.5
  fliplr: 0.5
  flipud: 0.0
  mosaic: 1.0
  mixup: 0.15
  copy_paste: 0.15
  domain_randomization: true  # IMPROVEMENT 3: Domain adaptation augmentation
  domain_randomization_params:
    brightness_range: [0.6, 1.4]
    contrast_range: [0.7, 1.3]
    saturation_range: [0.5, 1.5]
    hue_shift: 0.05
    blur_prob: 0.1
    noise_prob: 0.1
    jpeg_quality_range: [70, 100]

evaluation:
  conf_threshold: 0.25
  iou_threshold: 0.45
  max_det: 300

logging:
  project: road_damage_detection
  name: yolov11_improved
  save_dir: ./runs
  tensorboard: true
  wandb: false

output:
  save_dir: ./runs/yolov11_improved
  save_period: 10
